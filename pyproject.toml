[tool.ruff]
target-version = "py39"
line-length = 100
extend-exclude = ["venv", ".venv", "outputs"]

[tool.ruff.lint]
# Pyflakes (F) + a pragmatic subset of pycodestyle (E/W) errors. Line-length
# (E501) is intentionally not enforced — the modules use long teaching strings.
select = ["E4", "E7", "E9", "F", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
    "ignore::UserWarning",
    "ignore::FutureWarning",
]
